<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Order Placed! - QuickBite</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="/" class="brand">🍔 QuickBite</a>
</nav>

<div class="page" style="max-width:500px;text-align:center;padding-top:60px">
  <div style="font-size:5rem;margin-bottom:20px">🎉</div>
  <h1 style="color:#4caf50;margin-bottom:12px">Order Placed!</h1>
  <p style="color:#666;margin-bottom:8px">Your order has been confirmed.</p>
  <p style="color:#666;margin-bottom:32px">A confirmation email has been sent to you.</p>

  <div style="background:#fff;padding:24px;border-radius:16px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,0.08)">
    <div style="font-size:1.2rem;font-weight:700;color:#ff6b35">Order #<span id="orderId"></span></div>
    <div style="color:#888;margin-top:8px">Estimated delivery: 30-40 minutes</div>
  </div>

  <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap">
    <button class="btn-orange" onclick="trackOrder()">📍 Track Order</button>
    <a href="/menu/menu.html" class="btn-outline">Continue Shopping</a>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('orderId');
  document.getElementById('orderId').textContent = orderId;

  function trackOrder() {
    window.location.href = '/order/tracking.html?orderId=' + orderId;
  }
</script>
</body>
</html>
