<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - QuickBite</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="/" class="brand">🍔 QuickBite</a>
  <div class="nav-links"><a href="/auth/register.html">Register</a></div>
</nav>

<div class="form-container">
  <h2>Welcome Back 👋</h2>
  <div id="msg"></div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password"/>
  </div>
  <button class="form-submit" onclick="login()">Login</button>
  <div class="form-link">Don't have an account? <a href="/auth/register.html">Register</a></div>
  <div class="form-link" style="margin-top:8px">
    <small style="color:#999">Admin? Use: admin@quickbite.com / admin123</small>
  </div>
</div>

<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!email || !password) { showMsg('Please fill all fields', 'error'); return; }

  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (data.token) {
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', data.role);
    localStorage.setItem('name', data.name);
    if (data.role === 'ADMIN') window.location.href = '/admin/dashboard.html';
    else window.location.href = '/menu/menu.html';
  } else {
    showMsg(data.error || 'Login failed', 'error');
  }
}

function showMsg(msg, type) {
  document.getElementById('msg').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
