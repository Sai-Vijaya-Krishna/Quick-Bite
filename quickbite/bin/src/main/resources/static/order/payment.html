<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payment - QuickBite</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="/" class="brand">🍔 QuickBite</a>
  <div class="nav-links"><a href="/cart/cart.html">← Back to Cart</a></div>
</nav>

<div class="page" style="max-width:680px">
  <h1 class="page-title">Checkout 💳</h1>
  <div id="msg"></div>

  <div style="background:#fff;padding:24px;border-radius:16px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,0.08)">
    <h3 style="margin-bottom:16px;color:#ff6b35">Order Summary</h3>
    <div id="orderSummary"></div>
    <div style="border-top:1px solid #eee;padding-top:12px;margin-top:12px;font-weight:700;display:flex;justify-content:space-between">
      <span>Total (incl. delivery)</span>
      <span id="totalAmt" style="color:#ff6b35"></span>
    </div>
  </div>

  <div class="form-container" style="margin:0;box-shadow:0 2px 12px rgba(0,0,0,0.08)">
    <h3 style="margin-bottom:20px;color:#ff6b35">Delivery Details</h3>
    <div class="form-group">
      <label>Delivery Address</label>
      <input type="text" id="address" placeholder="Enter full delivery address"/>
    </div>
    <div class="form-group">
      <label>Payment Method</label>
      <select id="paymentMethod">
        <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
        <option value="UPI">UPI</option>
        <option value="CARD">Card</option>
        <option value="NETBANKING">Net Banking</option>
      </select>
    </div>
    <button class="form-submit" onclick="placeOrder()">Place Order 🚀</button>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/auth/login.html';

  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  if (cart.length === 0) window.location.href = '/menu/menu.html';

  const subtotal = cart.reduce((s, c) => s + c.price * c.quantity, 0);
  document.getElementById('totalAmt').textContent = '₹' + (subtotal + 30).toFixed(2);
  document.getElementById('orderSummary').innerHTML = cart.map(c =>
    `<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:0.9rem">
      <span>${c.name} × ${c.quantity}</span>
      <span>₹${(c.price * c.quantity).toFixed(2)}</span>
    </div>`
  ).join('');

  async function placeOrder() {
    const address = document.getElementById('address').value;
    const paymentMethod = document.getElementById('paymentMethod').value;
    if (!address) { showMsg('Please enter delivery address', 'error'); return; }

    const orderRequest = {
      items: cart.map(c => ({ menuItemId: c.menuItemId, quantity: c.quantity })),
      deliveryAddress: address,
      paymentMethod: paymentMethod
    };

    const res = await fetch('/api/orders/place', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(orderRequest)
    });
    const data = await res.json();

    if (data.id) {
      localStorage.removeItem('cart');
      window.location.href = '/order/success.html?orderId=' + data.id;
    } else {
      showMsg(data.error || 'Order failed. Try again.', 'error');
    }
  }

  function showMsg(msg, type) {
    document.getElementById('msg').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }
</script>
</body>
</html>
