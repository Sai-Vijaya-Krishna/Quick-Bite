<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register - QuickBite</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="/" class="brand">🍔 QuickBite</a>
  <div class="nav-links"><a href="/auth/login.html">Login</a></div>
</nav>

<div class="form-container">
  <h2>Create Account 🍔</h2>
  <div id="msg"></div>
  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter your name"/>
  </div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Create a password"/>
  </div>
  <div class="form-group">
    <label>Phone</label>
    <input type="text" id="phone" placeholder="Enter your phone number"/>
  </div>
  <div class="form-group">
    <label>Delivery Address</label>
    <input type="text" id="address" placeholder="Enter your default address"/>
  </div>
  <button class="form-submit" onclick="register()">Create Account</button>
  <div class="form-link">Already have an account? <a href="/auth/login.html">Login</a></div>
</div>

<script>
async function register() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const phone = document.getElementById('phone').value;
  const address = document.getElementById('address').value;

  if (!name || !email || !password) { showMsg('Please fill required fields', 'error'); return; }

  const res = await fetch('/api/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name, email, password, phone, address })
  });
  const data = await res.json();
  if (data.token) {
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', data.role);
    localStorage.setItem('name', data.name);
    showMsg('Account created! Redirecting...', 'success');
    setTimeout(() => window.location.href = '/menu/menu.html', 1500);
  } else {
    showMsg(data.error || 'Registration failed', 'error');
  }
}

function showMsg(msg, type) {
  document.getElementById('msg').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}
</script>
</body>
</html>
